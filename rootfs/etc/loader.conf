# nOS Boot Loader Configuration

# --- Root filesystem ---
zfs_load="YES"
vfs.root.mountfrom="zfs:zroot/ROOT/default"

# --- Boot behaviour ---
autoboot_delay="3"
beastie_disable="YES"
loader_logo="none"

# --- Console ---
kern.vty=vt
allscreens_flags="-T xterm-256color"

# --- QEMU / VirtIO drivers ---
virtio_load="YES"
virtio_pci_load="YES"
virtio_blk_load="YES"
virtio_net_load="YES"
virtio_balloon_load="YES"
virtio_random_load="YES"
virtio_console_load="YES"

# --- NVMe (modern QEMU storage) ---
nvme_load="YES"

# --- Graphics ---
drm_load="YES"

# --- Audio ---
snd_hda_load="YES"

# --- ACPI ---
acpi_load="YES"

# --- Linux compat (optional) ---
# linux_load="YES"
# linux64_load="YES"
