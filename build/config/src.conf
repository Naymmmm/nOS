# nOS FreeBSD source build configuration
# Strips components unnecessary for a desktop system.

# --- Keep ---
WITH_OPENSSL=yes
WITH_BHYVE=yes
WITH_ZFS=yes
WITH_LLVM_TARGET_ALL=yes

# --- Remove server/legacy components ---
WITHOUT_BLUETOOTH=yes
WITHOUT_CLANG_EXTRAS=yes
WITHOUT_GAMES=yes
WITHOUT_LPR=yes
WITHOUT_NIS=yes
WITHOUT_NFS=yes
WITHOUT_RCMDS=yes
WITHOUT_SENDMAIL=yes
WITHOUT_SYSCONS=yes
WITHOUT_TELNET=yes
WITHOUT_TFTP=yes
WITHOUT_TFTPD=yes
WITHOUT_YPCLNT=yes
WITHOUT_KERBEROS=yes
WITHOUT_KERBEROS_SUPPORT=yes
WITHOUT_HAST=yes
WITHOUT_ISCSI=yes
WITHOUT_PPP=yes

# --- Strip debug symbols for release ---
WITHOUT_DEBUG_FILES=yes
WITHOUT_KERNEL_SYMBOLS=yes
