# nOS System Configuration
# /etc/rc.conf — base defaults, extended by installer

# --- Identity ---
# hostname is set by installer

# --- ZFS ---
zfs_enable="YES"
zfsd_enable="YES"

# --- Desktop ---
dbus_enable="YES"
lightdm_enable="YES"
moused_enable="YES"
moused_nondefault_handler="YES"
hald_enable="NO"

# --- Time ---
ntpd_enable="YES"
ntpd_sync_on_start="YES"

# --- Disable unused services ---
sendmail_enable="NONE"
sendmail_submit_enable="NO"
sendmail_outbound_enable="NO"
sendmail_msp_queue_enable="NO"
syslogd_flags="-ss"
inetd_enable="NO"

# --- System ---
dumpdev="NO"
clear_tmp_enable="YES"
